{% extends "base.html" %}

{% block pageheading %}Admin{% endblock %}

{% block main %}
    <h3 style="...">Add a Category</h3>
    <form style="..." class = "myform" method="post" action="add_category">
        <div class = "form-group">
            <div class = "form-label" for="cat_name"> Category name: </div>
            <div class="form-element"><input type="text" id="cat_name" name="cat_email"></div>
        </div>

    <div class = "form-group">
            <div class = "form-label"> Password: </div>
            <div class="form-element"><input type="password" name="user_password" required></div>
        </div>

    <div class = "form-group">
            <div class = "form-label"></div>
            <div class="form-element"><input type="submit" value="login"></div>
        </div>
    </form>
    <br>
    <br>
    <br>
    <p>Don't have an account? <a href="/signup">Sign up!</a></p>
{% endblock %}
